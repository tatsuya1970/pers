<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>決済完了 - PersImage</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #09090b;
            --card: #18181b;
        }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: var(--card);
            padding: 48px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: var(--primary);
            font-size: 40px;
            animation: scaleIn 0.5s 0.3s both;
        }
        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            margin: 0 0 12px;
        }
        p {
            color: #a1a1aa;
            line-height: 1.6;
            margin: 0 0 32px;
        }
        .loader-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        .loader-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: var(--primary);
            width: 0%;
            animation: loading 3s linear forwards;
        }
        @keyframes loading {
            to { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-circle">✓</div>
        <h1>決済が完了しました！</h1>
        <p id="message">プランをアップグレード中です。<br>自動的にホーム画面に戻ります...</p>
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUX08T22WyzTNZ9HLLxTdUnNMgW4TCZq4",
            authDomain: "pers-56158.firebaseapp.com",
            projectId: "pers-56158",
            storageBucket: "pers-56158.firebasestorage.app",
            messagingSenderId: "1066568906813",
            appId: "1:1066568906813:web:188119efe3221d8ef05254",
            measurementId: "G-YWFZKDH1G8"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, async (user) => {
            // Webhookの反映を待つための待機
            setTimeout(() => {
                window.location.href = "/";
            }, 3000);
        });
    </script>
</body>
</html>
